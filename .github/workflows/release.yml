name: Release

on:
  push:
    branches:
      - main

permissions: read-all

env:
  IMAGE_REPOSITORY: ${{ secrets.REGISTRY_HOST }}/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # persist-credentials: true is intentional — semantic-release needs
          # to push the version tag and commit back to the repo
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Force branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
          enable-cache: false

      - name: Semantic Release (Version, Tag, Build, Push)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: actions@users.noreply.github.com
        run: |
          uvx --from python-semantic-release semantic-release version

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

  docker:
    if: needs.release.outputs.released == 'true'

    needs: release
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-docker-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    environment:
      name: registry

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build & Push image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Sign image with Cosign (keyless)
        env:
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_REPOSITORY}@${IMAGE_DIGEST}"
          cosign sign --yes "$IMAGE"

      - name: Attest image provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REPOSITORY }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
