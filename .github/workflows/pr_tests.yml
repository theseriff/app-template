---
name: Run all tests

on:
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  IMAGE_REPOSITORY: ${{ github.repository }}

jobs:
  pre-commit-check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install the project
        run: uv sync --locked --no-dev --group lint

      - uses: j178/prek-action@53276d8b0d10f8b6672aa85b4588c6921d0370cc # v2.0.1
        with:
          install-only: true

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
      - name: Execute Pre-Commit
        run: just pre-commit-all

  test-basic:
    if: github.event.pull_request.draft == false
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 10

    strategy:
      matrix:
        py_version: ["3.13", "3.14"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    environment:
      name: tests
    env:
      WORKDIR_SESSION: ${{ vars.WORKDIR_SESSION }}
      DATABASE_DSN: ${{ vars.DATABASE_DSN }}
      CHAT_IDS: ${{ vars.CHAT_IDS }}

      API_ID: ${{ secrets.API_ID }}
      API_HASH: ${{ secrets.API_HASH }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.py_version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install the project
        run: uv sync --locked --no-dev --group test

      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0

      - name: Run all tests
        run: just test-coverage-all

      - name: Prepare coverage file for combining
        run: |
          mkdir -p coverage
          mv .coverage "coverage/.coverage.${{ runner.os }}-py${{ matrix.py_version }}.${{ github.run_id }}"

      - name: Store coverage files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: .coverage.${{ runner.os }}-py${{ matrix.py_version }}
          path: coverage
          if-no-files-found: error
          include-hidden-files: true

  coverage-combine:
    if: github.event.pull_request.draft == false
    needs:
      - test-basic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "latest"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: .coverage*
          path: coverage
          merge-multiple: true

      - name: Combine coverage and generate reports
        run: |
          uv pip install --system coverage[toml] covdefaults
          coverage combine coverage
          coverage report
          coverage html --show-contexts --title "Coverage for ${{ github.sha }}"

      - name: Store coverage html
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-html
          path: htmlcov

  build-and-scan:
    if: github.event.pull_request.draft == false
    needs:
      - test-basic
    name: "Build & Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          tags: ${{ env.IMAGE_REPOSITORY }}:pr-${{ github.event.pull_request.number }}
          outputs: type=docker,dest=${{ runner.temp }}/image.tar

      - name: Load image
        run: docker load -i ${{ runner.temp }}/image.tar

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPOSITORY }}:pr-${{ github.event.pull_request.number }}
          scan-type: image
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          timeout: 5m

  # https://github.com/marketplace/actions/alls-green#why
  check: # This job does nothing and is only used for the branch protection
    # from: https://github.com/re-actors/alls-green
    # Important: For this to work properly, it is a must to have the job always
    # run, otherwise GitHub will make it skipped when any of the dependencies
    # fail. In some contexts, skipped is interpreted as success which may lead
    # to undesired, unobvious and even dangerous (as in security breach
    # "dangerous") side-effects.
    if: always()

    needs:
      - pre-commit-check
      - test-basic
      - coverage-combine
      - build-and-scan

    runs-on: ubuntu-latest

    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
